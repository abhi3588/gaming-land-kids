<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>GamingLand Kids</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
/* ── Design System ── */
:root {
    --bg: #FFF8F0;
    --fg: #3D2C1E;
    --fg-light: #7A6655;
    --coral: #FF6B6B;
    --coral-dark: #E85555;
    --teal: #00C9A7;
    --teal-dark: #00A88A;
    --yellow: #FFD166;
    --yellow-dark: #F0BC4A;
    --orange: #FF9F43;
    --orange-dark: #E8882E;
    --pink: #FF6B9D;
    --pink-dark: #E85585;
    --green: #51CF66;
    --green-dark: #3DB856;
    --card-bg: #FFFFFF;
    --card-shadow: 0 8px 32px rgba(61,44,30,0.10);
    --radius: 20px;
    --radius-sm: 12px;
    --radius-lg: 28px;
    --font-display: 'Fredoka', sans-serif;
    --font-ui: 'Outfit', sans-serif;
}

/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-tap-highlight-color: transparent; }
body {
    font-family: var(--font-ui);
    background: var(--bg);
    color: var(--fg);
    min-height: 100dvh;
    overflow-x: hidden;
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
}

/* ── Background Shapes ── */
.bg-shapes {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 0;
    overflow: hidden;
}
.bg-shape {
    position: absolute;
    border-radius: 50%;
    animation: bgFloat linear infinite;
    will-change: transform;
}
.bg-shape-star { clip-path: polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%); border-radius: 0; }
.bg-shape-triangle { clip-path: polygon(50% 0%,0% 100%,100% 100%); border-radius: 0; }

@keyframes bgFloat {
    0%, 100% { transform: translateY(0) rotate(0deg) scale(1); }
    25% { transform: translateY(-30px) rotate(90deg) scale(1.05); }
    50% { transform: translateY(-10px) rotate(180deg) scale(0.95); }
    75% { transform: translateY(-40px) rotate(270deg) scale(1.02); }
}

/* ── App Container ── */
#app {
    position: relative;
    z-index: 1;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* ── Screens ── */
.screen { display: none; width: 100%; max-width: 700px; padding: 20px; flex-direction: column; align-items: center; }
.screen.active { display: flex; }

/* ── Mute Button ── */
#mute-btn {
    position: fixed; top: 16px; right: 16px; z-index: 1000;
    width: 48px; height: 48px;
    border: none; border-radius: 50%;
    background: var(--card-bg);
    box-shadow: 0 2px 12px rgba(61,44,30,0.12);
    color: var(--fg);
    font-size: 20px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.2s, box-shadow 0.2s;
}
#mute-btn:hover { transform: scale(1.1); box-shadow: 0 4px 20px rgba(61,44,30,0.18); }
#mute-btn:active { transform: scale(0.95); }
#mute-btn.muted { color: var(--coral); }

/* ── Home Screen ── */
.home-header {
    text-align: center;
    margin: 40px 0 10px;
}
.home-header h1 {
    font-family: var(--font-display);
    font-size: clamp(2.2rem, 7vw, 3.2rem);
    font-weight: 700;
    background: linear-gradient(135deg, var(--coral), var(--orange), var(--yellow), var(--teal));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.2;
}
.home-header p {
    font-family: var(--font-display);
    font-size: clamp(1rem, 3vw, 1.3rem);
    color: var(--fg-light);
    margin-top: 8px;
    font-weight: 500;
}

/* ── Game Grid ── */
.game-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-top: 30px;
    width: 100%;
    padding: 0 10px;
}
.game-card {
    background: var(--card-bg);
    border-radius: var(--radius-lg);
    padding: 28px 18px 22px;
    text-align: center;
    cursor: pointer;
    box-shadow: var(--card-shadow);
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s;
    animation: cardFloat 4s ease-in-out infinite;
    position: relative;
    overflow: hidden;
}
.game-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
}
.game-card:nth-child(1) { animation-delay: 0s; }
.game-card:nth-child(1)::before { background: var(--teal); }
.game-card:nth-child(2) { animation-delay: 0.6s; }
.game-card:nth-child(2)::before { background: var(--green); }
.game-card:nth-child(3) { animation-delay: 1.2s; }
.game-card:nth-child(3)::before { background: var(--orange); }
.game-card:nth-child(4) { animation-delay: 1.8s; }
.game-card:nth-child(4)::before { background: var(--yellow-dark); }

.game-card:hover { transform: translateY(-6px) scale(1.03); box-shadow: 0 12px 40px rgba(61,44,30,0.15); }
.game-card:active { transform: scale(0.97); }

.game-card-icon {
    width: 64px; height: 64px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 14px;
    font-size: 28px;
    color: white;
}
.game-card:nth-child(1) .game-card-icon { background: var(--teal); }
.game-card:nth-child(2) .game-card-icon { background: var(--green); }
.game-card:nth-child(3) .game-card-icon { background: var(--orange); }
.game-card:nth-child(4) .game-card-icon { background: var(--yellow-dark); }

.game-card h3 {
    font-family: var(--font-display);
    font-size: 1.15rem;
    font-weight: 600;
    margin-bottom: 6px;
}
.game-card p {
    font-size: 0.85rem;
    color: var(--fg-light);
    line-height: 1.3;
}

@keyframes cardFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
}

/* ── Game Screen Header ── */
.game-header {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    margin-bottom: 20px;
    padding-top: 10px;
}
.game-header button {
    width: 48px; height: 48px;
    border: none; border-radius: 50%;
    background: var(--card-bg);
    box-shadow: 0 2px 10px rgba(61,44,30,0.10);
    color: var(--fg);
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.2s;
    flex-shrink: 0;
}
.game-header button:hover { transform: scale(1.1); }
.game-header button:active { transform: scale(0.92); }
.game-header h2 {
    font-family: var(--font-display);
    font-size: 1.5rem;
    font-weight: 600;
    flex: 1;
}
.game-score {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 1rem;
    color: var(--fg-light);
    display: flex; align-items: center; gap: 6px;
    background: var(--card-bg);
    padding: 6px 14px;
    border-radius: 20px;
    box-shadow: 0 2px 8px rgba(61,44,30,0.08);
}
.game-score i { color: var(--yellow-dark); }

/* ── Game Area ── */
#game-area {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 400px;
}

/* ── Level Banner ── */
.level-banner {
    font-family: var(--font-display);
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--fg-light);
    margin-bottom: 20px;
    text-align: center;
}

/* ── Ocean Match ── */
.memory-grid {
    display: grid;
    gap: 12px;
    width: 100%;
    max-width: 420px;
    margin: 0 auto;
}
.memory-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
.memory-grid.cols-4 { grid-template-columns: repeat(4, 1fr); }

.memory-card {
    aspect-ratio: 1;
    perspective: 800px;
    cursor: pointer;
}
.memory-card-inner {
    width: 100%; height: 100%;
    position: relative;
    transition: transform 0.5s cubic-bezier(0.34,1.56,0.64,1);
    transform-style: preserve-3d;
}
.memory-card.flipped .memory-card-inner,
.memory-card.matched .memory-card-inner {
    transform: rotateY(180deg);
}
.memory-card-face {
    position: absolute; inset: 0;
    backface-visibility: hidden;
    border-radius: var(--radius);
    display: flex; align-items: center; justify-content: center;
    font-size: clamp(2rem, 6vw, 3rem);
}
.memory-card-back {
    background: linear-gradient(135deg, var(--teal), var(--teal-dark));
    box-shadow: 0 4px 16px rgba(0,201,167,0.25);
}
.memory-card-back::after {
    content: '\f128';
    font-family: 'Font Awesome 6 Free';
    font-weight: 900;
    font-size: 1.5rem;
    color: rgba(255,255,255,0.5);
}
.memory-card-front {
    background: var(--card-bg);
    transform: rotateY(180deg);
    box-shadow: 0 4px 16px rgba(61,44,30,0.10);
}
.memory-card.matched .memory-card-front {
    background: #E0FFF8;
    box-shadow: 0 4px 20px rgba(0,201,167,0.3);
    animation: matchBounce 0.5s ease;
}
.memory-card.shake .memory-card-inner {
    animation: cardShake 0.4s ease;
}

@keyframes matchBounce {
    0%, 100% { transform: rotateY(180deg) scale(1); }
    50% { transform: rotateY(180deg) scale(1.1); }
}
@keyframes cardShake {
    0%, 100% { transform: rotateY(180deg) translateX(0); }
    25% { transform: rotateY(180deg) translateX(-6px); }
    75% { transform: rotateY(180deg) translateX(6px); }
}

/* ── Fruit Sort ── */
.sort-baskets {
    display: flex;
    gap: 14px;
    margin-bottom: 28px;
    width: 100%;
    justify-content: center;
    flex-wrap: wrap;
}
.sort-basket {
    width: 120px; min-height: 100px;
    border: 3px dashed;
    border-radius: var(--radius);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: transform 0.2s, border-color 0.2s, background 0.2s;
    cursor: pointer;
    padding: 12px 8px;
    position: relative;
}
.sort-basket.highlight {
    transform: scale(1.06);
    background: rgba(255,255,255,0.5);
}
.sort-basket-label {
    font-family: var(--font-display);
    font-size: 0.85rem;
    font-weight: 600;
}
.sort-basket-count {
    font-family: var(--font-display);
    font-size: 0.75rem;
    opacity: 0.6;
}
.sort-fruits {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    justify-content: center;
    max-width: 400px;
}
.sort-fruit {
    width: 72px; height: 72px;
    border-radius: var(--radius);
    background: var(--card-bg);
    box-shadow: 0 4px 14px rgba(61,44,30,0.10);
    display: flex; align-items: center; justify-content: center;
    font-size: 2.4rem;
    cursor: pointer;
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s;
    position: relative;
}
.sort-fruit:hover { transform: scale(1.08); }
.sort-fruit:active { transform: scale(0.95); }
.sort-fruit.selected {
    transform: scale(1.12) translateY(-4px);
    box-shadow: 0 8px 28px rgba(61,44,30,0.18);
    outline: 3px solid var(--orange);
    outline-offset: 2px;
}
.sort-fruit.correct-anim {
    animation: fruitCorrect 0.5s ease forwards;
}
.sort-fruit.wrong-anim {
    animation: fruitWrong 0.4s ease;
}
.sort-fruit.hidden-fruit {
    opacity: 0;
    transform: scale(0.3);
    pointer-events: none;
    transition: all 0.4s ease;
}

@keyframes fruitCorrect {
    0% { transform: scale(1.12); }
    50% { transform: scale(1.3) rotate(10deg); }
    100% { transform: scale(0.3); opacity: 0; }
}
@keyframes fruitWrong {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-6px); }
    80% { transform: translateX(6px); }
}

/* ── Pattern Train ── */
.train-container {
    width: 100%;
    overflow-x: auto;
    padding: 10px 0 30px;
    -webkit-overflow-scrolling: touch;
}
.train-track {
    display: flex;
    align-items: flex-end;
    gap: 0;
    min-width: max-content;
    padding: 0 20px;
}
.train-engine {
    font-size: 3rem;
    line-height: 1;
    margin-bottom: 10px;
    flex-shrink: 0;
    animation: engineRock 1s ease-in-out infinite;
}
@keyframes engineRock {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(-2deg); }
    75% { transform: rotate(2deg); }
}
.train-link {
    width: 14px;
    height: 4px;
    background: #AAA;
    border-radius: 2px;
    margin-bottom: 26px;
    flex-shrink: 0;
}
.train-car {
    width: 56px; height: 52px;
    border-radius: 12px 12px 6px 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem;
    color: white;
    font-weight: 700;
    position: relative;
    flex-shrink: 0;
    box-shadow: 0 3px 10px rgba(0,0,0,0.15);
    transition: transform 0.3s;
}
.train-car::after {
    content: '';
    position: absolute;
    bottom: -7px; left: 8px;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: #666;
    box-shadow: 24px 0 0 #666;
}
.train-car-mystery {
    border: 3px dashed #BBB;
    background: #F5F5F5 !important;
    color: var(--fg-light) !important;
    font-family: var(--font-display);
    font-size: 1.8rem;
    animation: mysteryPulse 1.5s ease-in-out infinite;
}
@keyframes mysteryPulse {
    0%, 100% { border-color: #BBB; }
    50% { border-color: var(--orange); }
}
.pattern-options {
    display: flex;
    gap: 16px;
    margin-top: 16px;
    justify-content: center;
    flex-wrap: wrap;
}
.pattern-option {
    width: 72px; height: 64px;
    border-radius: var(--radius);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(61,44,30,0.10);
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
    border: 3px solid transparent;
}
.pattern-option:hover { transform: scale(1.08); }
.pattern-option:active { transform: scale(0.93); }
.pattern-option.correct {
    border-color: var(--green);
    animation: optionCorrect 0.5s ease;
}
.pattern-option.wrong {
    animation: fruitWrong 0.4s ease;
}
@keyframes optionCorrect {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.15); }
}

/* ── Star Count ── */
.star-question {
    font-family: var(--font-display);
    font-size: clamp(1.2rem, 4vw, 1.6rem);
    font-weight: 600;
    color: var(--fg-light);
    margin-bottom: 20px;
    text-align: center;
}
.star-field {
    position: relative;
    width: 100%;
    max-width: 380px;
    height: 260px;
    margin: 0 auto 24px;
    background: linear-gradient(180deg, #1a1a3e 0%, #2d1b69 50%, #3D2C1E 100%);
    border-radius: var(--radius-lg);
    overflow: hidden;
    box-shadow: inset 0 0 40px rgba(0,0,0,0.3);
}
.star-field::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.6), transparent),
                radial-gradient(1px 1px at 60% 15%, rgba(255,255,255,0.4), transparent),
                radial-gradient(1px 1px at 80% 60%, rgba(255,255,255,0.5), transparent),
                radial-gradient(1px 1px at 40% 80%, rgba(255,255,255,0.3), transparent),
                radial-gradient(1px 1px at 10% 70%, rgba(255,255,255,0.4), transparent),
                radial-gradient(1px 1px at 90% 25%, rgba(255,255,255,0.5), transparent),
                radial-gradient(1px 1px at 50% 50%, rgba(255,255,255,0.3), transparent),
                radial-gradient(1.5px 1.5px at 30% 10%, rgba(255,255,255,0.6), transparent),
                radial-gradient(1px 1px at 70% 85%, rgba(255,255,255,0.4), transparent);
    pointer-events: none;
}
.count-star {
    position: absolute;
    font-size: 2.6rem;
    cursor: pointer;
    transition: transform 0.2s;
    animation: starAppear 0.5s cubic-bezier(0.34,1.56,0.64,1) backwards;
    filter: drop-shadow(0 0 6px rgba(255,209,102,0.6));
}
.count-star:hover { transform: scale(1.2); }
.count-star:active { transform: scale(0.9); }
.count-star.tapped {
    animation: starTap 0.3s ease;
}
@keyframes starAppear {
    from { transform: scale(0) rotate(-180deg); opacity: 0; }
    to { transform: scale(1) rotate(0); opacity: 1; }
}
@keyframes starTap {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.4) rotate(15deg); }
}
.count-options {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
}
.count-option {
    width: 72px; height: 72px;
    border-radius: 50%;
    background: var(--card-bg);
    box-shadow: 0 4px 16px rgba(61,44,30,0.12);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display);
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--fg);
    cursor: pointer;
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s;
}
.count-option:hover { transform: scale(1.1); box-shadow: 0 6px 24px rgba(61,44,30,0.18); }
.count-option:active { transform: scale(0.93); }
.count-option.correct { background: var(--green); color: white; animation: optionCorrect 0.5s ease; }
.count-option.wrong { animation: fruitWrong 0.4s ease; }

/* ── Celebration Overlay ── */
.overlay {
    position: fixed; inset: 0;
    background: rgba(61,44,30,0.5);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 500;
    padding: 20px;
}
.overlay.active { display: flex; }
.celebration-content {
    background: var(--card-bg);
    border-radius: var(--radius-lg);
    padding: 40px 36px 32px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(61,44,30,0.2);
    animation: celebAppear 0.5s cubic-bezier(0.34,1.56,0.64,1);
    max-width: 360px;
    width: 100%;
}
@keyframes celebAppear {
    from { transform: scale(0.5) translateY(40px); opacity: 0; }
    to { transform: scale(1) translateY(0); opacity: 1; }
}
.celebration-content h2 {
    font-family: var(--font-display);
    font-size: 2rem;
    font-weight: 700;
    margin-bottom: 8px;
}
.celebration-sub {
    color: var(--fg-light);
    font-size: 1rem;
    margin-bottom: 20px;
}
.celeb-stars {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 28px;
}
.celeb-star {
    font-size: 2.4rem;
    color: #DDD;
    transition: color 0.3s, transform 0.4s;
}
.celeb-star.earned {
    color: var(--yellow-dark);
    animation: starEarn 0.5s cubic-bezier(0.34,1.56,0.64,1) backwards;
}
.celeb-star:nth-child(2).earned { animation-delay: 0.15s; }
.celeb-star:nth-child(3).earned { animation-delay: 0.3s; }
@keyframes starEarn {
    from { transform: scale(0) rotate(-90deg); }
    to { transform: scale(1) rotate(0); }
}
.celeb-buttons {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
}
.btn {
    font-family: var(--font-display);
    font-size: 1rem;
    font-weight: 600;
    border: none;
    border-radius: 50px;
    padding: 14px 28px;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
}
.btn:hover { transform: translateY(-2px); }
.btn:active { transform: scale(0.95); }
.btn-primary {
    background: linear-gradient(135deg, var(--coral), var(--orange));
    color: white;
    box-shadow: 0 4px 16px rgba(255,107,107,0.3);
}
.btn-secondary {
    background: var(--card-bg);
    color: var(--fg);
    box-shadow: 0 2px 10px rgba(61,44,30,0.1);
}

/* ── Confetti Canvas ── */
#confetti-canvas {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 600;
    display: none;
}

/* ── Toast ── */
.toast {
    position: fixed;
    bottom: 30px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--fg);
    color: var(--bg);
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 0.95rem;
    padding: 12px 24px;
    border-radius: 50px;
    z-index: 800;
    opacity: 0;
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
    white-space: nowrap;
}
.toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
}

/* ── Responsive ── */
@media (max-width: 500px) {
    .game-grid { gap: 14px; }
    .game-card { padding: 20px 14px 18px; }
    .game-card-icon { width: 52px; height: 52px; font-size: 22px; }
    .game-card h3 { font-size: 1rem; }
    .game-card p { font-size: 0.78rem; }
    .sort-basket { width: 95px; min-height: 80px; }
    .sort-fruit { width: 60px; height: 60px; font-size: 2rem; }
    .train-car { width: 46px; height: 44px; font-size: 1.3rem; }
    .train-engine { font-size: 2.4rem; }
    .count-star { font-size: 2.2rem; }
    .count-option { width: 62px; height: 62px; font-size: 1.5rem; }
    .memory-card-face { font-size: clamp(1.6rem, 5vw, 2.4rem); }
}

@media (max-width: 360px) {
    .game-grid { grid-template-columns: 1fr; max-width: 260px; }
    .sort-baskets { gap: 8px; }
    .sort-basket { width: 80px; }
}

/* ── Reduced Motion ── */
@media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.15s !important;
    }
}
</style>

<script>
/* ══════════════════════════════════════════
   Audio Manager — Web Audio API sounds
   ══════════════════════════════════════════ */
class AudioManager {
    constructor() {
        this.ctx = null;
        this.muted = false;
    }

    init() {
        if (this.ctx) return;
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    }

    _osc(type, freq, freqEnd, dur, vol) {
        if (this.muted || !this.ctx) return;
        const t = this.ctx.currentTime;
        const o = this.ctx.createOscillator();
        const g = this.ctx.createGain();
        o.type = type;
        o.connect(g);
        g.connect(this.ctx.destination);
        o.frequency.setValueAtTime(freq, t);
        if (freqEnd) o.frequency.exponentialRampToValueAtTime(Math.max(20, freqEnd), t + dur);
        g.gain.setValueAtTime(vol, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + dur);
        o.start(t);
        o.stop(t + dur);
    }

    pop() { this._osc('sine', 600, 200, 0.1, 0.25); }
    tap() { this._osc('sine', 440, 300, 0.08, 0.15); }
    ding() { this._osc('sine', 880, 880, 0.5, 0.25); }
    wrong() { this._osc('triangle', 220, 120, 0.3, 0.18); }

    cheer() {
        if (this.muted || !this.ctx) return;
        const notes = [523, 659, 784, 1047];
        notes.forEach((f, i) => {
            const t = this.ctx.currentTime + i * 0.14;
            const o = this.ctx.createOscillator();
            const g = this.ctx.createGain();
            o.type = 'sine';
            o.connect(g);
            g.connect(this.ctx.destination);
            o.frequency.setValueAtTime(f, t);
            g.gain.setValueAtTime(0.18, t);
            g.gain.exponentialRampToValueAtTime(0.001, t + 0.28);
            o.start(t);
            o.stop(t + 0.28);
        });
    }

    toggle() {
        this.muted = !this.muted;
        return this.muted;
    }
}

/* ══════════════════════════════════════════
   Confetti Effect
   ══════════════════════════════════════════ */
class Confetti {
    constructor(canvas) {
        this.canvas = canvas;
        this.c = canvas.getContext('2d');
        this.particles = [];
        this.running = false;
        this.raf = null;
    }

    start() {
        this.canvas.width = window.innerWidth;
        this.canvas.height = window.innerHeight;
        this.canvas.style.display = 'block';
        this.running = true;
        this.particles = [];
        const colors = ['#FF6B6B','#00C9A7','#FFD166','#FF9F43','#FF6B9D','#51CF66'];
        for (let i = 0; i < 120; i++) {
            this.particles.push({
                x: Math.random() * this.canvas.width,
                y: Math.random() * -this.canvas.height,
                w: Math.random() * 10 + 5,
                h: Math.random() * 6 + 3,
                color: colors[Math.floor(Math.random() * colors.length)],
                vx: (Math.random() - 0.5) * 5,
                vy: Math.random() * 3 + 2,
                rot: Math.random() * 360,
                rv: (Math.random() - 0.5) * 12,
                op: 1
            });
        }
        this._loop();
    }

    _loop() {
        if (!this.running) return;
        this.c.clearRect(0, 0, this.canvas.width, this.canvas.height);
        let alive = false;
        for (const p of this.particles) {
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.06;
            p.rot += p.rv;
            if (p.y > this.canvas.height + 20) p.op -= 0.03;
            if (p.op <= 0) continue;
            alive = true;
            this.c.save();
            this.c.translate(p.x, p.y);
            this.c.rotate(p.rot * Math.PI / 180);
            this.c.globalAlpha = Math.max(0, p.op);
            this.c.fillStyle = p.color;
            this.c.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
            this.c.restore();
        }
        this.raf = alive ? requestAnimationFrame(() => this._loop()) : null;
        if (!alive) this.stop();
    }

    stop() {
        this.running = false;
        if (this.raf) cancelAnimationFrame(this.raf);
        this.canvas.style.display = 'none';
    }
}

/* ══════════════════════════════════════════
   Game Manager — Navigation & State
   ══════════════════════════════════════════ */
class GameManager {
    constructor() {
        this.audio = new AudioManager();
        this.confetti = new Confetti(document.getElementById('confetti-canvas'));
        this.currentGame = null;
        this.score = 0;

        // DOM references
        this.homeScreen = document.getElementById('home-screen');
        this.gameScreen = document.getElementById('game-screen');
        this.gameArea = document.getElementById('game-area');
        this.gameTitle = document.getElementById('game-title');
        this.scoreVal = document.getElementById('score-val');
        this.celebration = document.getElementById('celebration');
        this.celebTitle = document.getElementById('celeb-title');
        this.celebSub = document.getElementById('celeb-sub');
        this.nextBtn = document.getElementById('next-level-btn');
        this.homeBtn = document.getElementById('home-btn');
        this.muteBtn = document.getElementById('mute-btn');
        this.toastEl = document.getElementById('toast');

        this._bindEvents();
        this._createBgShapes();
    }

    _bindEvents() {
        // Game cards
        document.querySelectorAll('.game-card').forEach(card => {
            card.addEventListener('click', () => {
                this.audio.init();
                this.audio.pop();
                this.openGame(card.dataset.game);
            });
            card.addEventListener('keydown', e => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    card.click();
                }
            });
        });

        // Back button
        document.getElementById('back-btn').addEventListener('click', () => this.goHome());

        // Celebration buttons
        this.nextBtn.addEventListener('click', () => {
            this.celebration.classList.remove('active');
            this.confetti.stop();
            if (this.currentGame && this.currentGame.nextLevel) {
                this.currentGame.nextLevel();
            }
        });
        this.homeBtn.addEventListener('click', () => {
            this.celebration.classList.remove('active');
            this.confetti.stop();
            this.goHome();
        });

        // Mute
        this.muteBtn.addEventListener('click', () => {
            this.audio.init();
            const muted = this.audio.toggle();
            this.muteBtn.classList.toggle('muted', muted);
            this.muteBtn.innerHTML = muted
                ? '<i class="fas fa-volume-xmark"></i>'
                : '<i class="fas fa-volume-high"></i>';
        });
    }

    _createBgShapes() {
        const container = document.querySelector('.bg-shapes');
        const types = ['', '-star', '-triangle'];
        const colors = ['#FF6B6B','#00C9A7','#FFD166','#FF9F43','#FF6B9D','#51CF66'];
        for (let i = 0; i < 14; i++) {
            const el = document.createElement('div');
            const size = Math.random() * 50 + 20;
            el.className = `bg-shape bg-shape${types[i % 3]}`;
            el.style.cssText = `
                left:${Math.random()*100}%;top:${Math.random()*100}%;
                width:${size}px;height:${size}px;
                background:${colors[i%colors.length]};
                opacity:${Math.random()*0.12+0.04};
                animation-delay:${Math.random()*6}s;
                animation-duration:${Math.random()*12+16}s;
            `;
            container.appendChild(el);
        }
    }

    openGame(id) {
        this.score = 0;
        this.scoreVal.textContent = '0';
        this.homeScreen.classList.remove('active');
        this.gameScreen.classList.add('active');

        // Destroy previous game
        if (this.currentGame && this.currentGame.destroy) this.currentGame.destroy();

        const titles = { memory: 'Ocean Match', sorting: 'Fruit Sort', patterns: 'Pattern Train', counting: 'Star Count' };
        this.gameTitle.textContent = titles[id] || '';

        switch (id) {
            case 'memory': this.currentGame = new OceanMatch(this); break;
            case 'sorting': this.currentGame = new FruitSort(this); break;
            case 'patterns': this.currentGame = new PatternTrain(this); break;
            case 'counting': this.currentGame = new StarCount(this); break;
        }
    }

    goHome() {
        if (this.currentGame && this.currentGame.destroy) this.currentGame.destroy();
        this.currentGame = null;
        this.gameScreen.classList.remove('active');
        this.homeScreen.classList.add('active');
        this.gameArea.innerHTML = '';
    }

    addScore(pts) {
        this.score += pts;
        this.scoreVal.textContent = this.score;
    }

    showCelebration(stars, msg, hasNextLevel) {
        this.audio.cheer();
        this.confetti.start();

        const titles = ['Good Try!', 'Great Job!', 'Amazing!', 'Perfect!'];
        this.celebTitle.textContent = titles[Math.min(stars, 3)] || 'Great Job!';
        this.celebSub.textContent = msg || '';
        this.nextBtn.style.display = hasNextLevel ? 'inline-flex' : 'none';

        // Animate stars
        document.querySelectorAll('.celeb-star').forEach(el => {
            el.classList.remove('earned');
            if (parseInt(el.dataset.star) <= stars) {
                // Force reflow for re-animation
                void el.offsetWidth;
                el.classList.add('earned');
            }
        });

        this.celebration.classList.add('active');
    }

    showToast(msg) {
        this.toastEl.textContent = msg;
        this.toastEl.classList.add('show');
        clearTimeout(this._toastTimer);
        this._toastTimer = setTimeout(() => this.toastEl.classList.remove('show'), 2000);
    }
}

/* ══════════════════════════════════════════
   Ocean Match — Memory Game
   ══════════════════════════════════════════ */
class OceanMatch {
    constructor(gm) {
        this.gm = gm;
        this.level = 1;
        this.maxLevel = 4;
        this.flipped = [];
        this.matched = 0;
        this.moves = 0;
        this.locked = false;
        this.start();
    }

    start() {
        const configs = [
            { cols: 3, rows: 2, pairs: 3 },
            { cols: 4, rows: 2, pairs: 4 },
            { cols: 4, rows: 3, pairs: 6 },
            { cols: 4, rows: 4, pairs: 8 },
        ];
        const cfg = configs[Math.min(this.level - 1, configs.length - 1)];
        this.cols = cfg.cols;
        this.rows = cfg.rows;
        this.totalPairs = cfg.pairs;
        this.matched = 0;
        this.moves = 0;
        this.flipped = [];
        this.locked = false;

        const creatures = ['🐙','🐠','🐋','⭐','🦀','🐸','🐬','🦈','🐢','🦑'];
        const selected = creatures.slice(0, this.totalPairs);
        const cards = [...selected, ...selected];
        this._shuffle(cards);
        this.cards = cards;

        this._render();
    }

    _shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
    }

    _render() {
        const area = this.gm.gameArea;
        area.innerHTML = `<div class="level-banner">Level ${this.level}</div>
            <div class="memory-grid cols-${this.cols}" id="mem-grid"></div>`;

        const grid = document.getElementById('mem-grid');
        this.cardEls = [];
        this.cards.forEach((emoji, i) => {
            const card = document.createElement('div');
            card.className = 'memory-card';
            card.dataset.index = i;
            card.innerHTML = `<div class="memory-card-inner">
                <div class="memory-card-face memory-card-back"></div>
                <div class="memory-card-face memory-card-front">${emoji}</div>
            </div>`;
            card.addEventListener('click', () => this._flip(i));
            grid.appendChild(card);
            this.cardEls.push(card);
        });
    }

    _flip(i) {
        if (this.locked) return;
        const el = this.cardEls[i];
        if (el.classList.contains('flipped') || el.classList.contains('matched')) return;
        if (this.flipped.length >= 2) return;

        this.gm.audio.pop();
        el.classList.add('flipped');
        this.flipped.push(i);

        if (this.flipped.length === 2) {
            this.moves++;
            this.locked = true;
            const [a, b] = this.flipped;
            if (this.cards[a] === this.cards[b]) {
                // Match
                setTimeout(() => {
                    this.gm.audio.ding();
                    this.cardEls[a].classList.add('matched');
                    this.cardEls[b].classList.add('matched');
                    this.matched++;
                    this.gm.addScore(10);
                    this.flipped = [];
                    this.locked = false;

                    if (this.matched === this.totalPairs) {
                        setTimeout(() => this._complete(), 500);
                    }
                }, 400);
            } else {
                // Mismatch
                setTimeout(() => {
                    this.gm.audio.wrong();
                    this.cardEls[a].classList.add('shake');
                    this.cardEls[b].classList.add('shake');
                    setTimeout(() => {
                        this.cardEls[a].classList.remove('flipped', 'shake');
                        this.cardEls[b].classList.remove('flipped', 'shake');
                        this.flipped = [];
                        this.locked = false;
                    }, 500);
                }, 700);
            }
        }
    }

    _complete() {
        const perfect = this.moves === this.totalPairs;
        const stars = perfect ? 3 : this.moves <= this.totalPairs * 1.5 ? 2 : 1;
        const hasNext = this.level < this.maxLevel;
        this.gm.showCelebration(stars, `${this.moves} moves to find all pairs!`, hasNext);
    }

    nextLevel() {
        this.level++;
        this.start();
    }

    destroy() {
        this.cardEls = [];
        this.flipped = [];
    }
}

/* ══════════════════════════════════════════
   Fruit Sort — Sorting by Color
   ══════════════════════════════════════════ */
class FruitSort {
    constructor(gm) {
        this.gm = gm;
        this.level = 1;
        this.maxLevel = 4;
        this.selected = null;
        this.sorted = 0;
        this.total = 0;
        this.wrongCount = 0;
        this.start();
    }

    start() {
        const configs = [
            { cats: 2, perCat: 2 },
            { cats: 2, perCat: 3 },
            { cats: 3, perCat: 2 },
            { cats: 3, perCat: 3 },
        ];
        const cfg = configs[Math.min(this.level - 1, configs.length - 1)];
        this.sorted = 0;
        this.wrongCount = 0;
        this.selected = null;

        const categories = [
            { name: 'Red', color: '#FF6B6B', bg: '#FFF0F0', fruits: ['🍎','🍓','🍒'] },
            { name: 'Yellow', color: '#FFD166', bg: '#FFFBF0', fruits: ['🍌','🍍','🍋'] },
            { name: 'Green', color: '#51CF66', bg: '#F0FFF4', fruits: ['🥝','🍏','🫒'] },
        ];
        this.cats = categories.slice(0, cfg.cats);

        // Generate fruits
        const fruits = [];
        this.cats.forEach((cat, ci) => {
            for (let j = 0; j < cfg.perCat; j++) {
                fruits.push({
                    emoji: cat.fruits[j % cat.fruits.length],
                    catIndex: ci
                });
            }
        });
        this._shuffle(fruits);
        this.fruits = fruits;
        this.total = fruits.length;

        this._render();
    }

    _shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
    }

    _render() {
        const area = this.gm.gameArea;
        let basketsHTML = this.cats.map((cat, i) =>
            `<div class="sort-basket" data-cat="${i}" style="border-color:${cat.color};background:${cat.bg};">
                <span class="sort-basket-label" style="color:${cat.color === '#FFD166' ? '#B8860B' : cat.color}">${cat.name}</span>
                <span class="sort-basket-count" id="basket-count-${i}">0</span>
            </div>`
        ).join('');

        let fruitsHTML = this.fruits.map((f, i) =>
            `<div class="sort-fruit" data-index="${i}" data-cat="${f.catIndex}">${f.emoji}</div>`
        ).join('');

        area.innerHTML = `<div class="level-banner">Level ${this.level}</div>
            <div class="sort-baskets">${basketsHTML}</div>
            <div class="sort-fruits" id="sort-fruits">${fruitsHTML}</div>`;

        // Event: select fruit
        area.querySelectorAll('.sort-fruit').forEach(el => {
            el.addEventListener('click', () => this._selectFruit(el));
        });
        // Event: tap basket
        area.querySelectorAll('.sort-basket').forEach(el => {
            el.addEventListener('click', () => this._tapBasket(el));
        });
    }

    _selectFruit(el) {
        if (el.classList.contains('hidden-fruit')) return;
        this.gm.audio.tap();
        // Deselect previous
        document.querySelectorAll('.sort-fruit.selected').forEach(e => e.classList.remove('selected'));
        el.classList.add('selected');
        this.selected = el;
    }

    _tapBasket(basketEl) {
        if (!this.selected) {
            this.gm.showToast('Tap a fruit first!');
            return;
        }
        const fruitCat = parseInt(this.selected.dataset.cat);
        const basketCat = parseInt(basketEl.dataset.cat);

        if (fruitCat === basketCat) {
            // Correct
            this.gm.audio.ding();
            this.selected.classList.remove('selected');
            this.selected.classList.add('correct-anim');
            const ref = this.selected;
            setTimeout(() => ref.classList.add('hidden-fruit'), 450);
            this.sorted++;
            this.gm.addScore(10);

            // Update basket count
            const countEl = document.getElementById(`basket-count-${basketCat}`);
            countEl.textContent = parseInt(countEl.textContent) + 1;

            this.selected = null;

            if (this.sorted === this.total) {
                setTimeout(() => this._complete(), 500);
            }
        } else {
            // Wrong
            this.gm.audio.wrong();
            this.wrongCount++;
            this.selected.classList.add('wrong-anim');
            const ref = this.selected;
            setTimeout(() => ref.classList.remove('wrong-anim', 'selected'), 400);
            this.selected = null;
        }
    }

    _complete() {
        const stars = this.wrongCount === 0 ? 3 : this.wrongCount <= 2 ? 2 : 1;
        const hasNext = this.level < this.maxLevel;
        this.gm.showCelebration(stars, `All fruits sorted!`, hasNext);
    }

    nextLevel() {
        this.level++;
        this.start();
    }

    destroy() {
        this.selected = null;
    }
}

/* ══════════════════════════════════════════
   Pattern Train — Sequence Patterns
   ══════════════════════════════════════════ */
class PatternTrain {
    constructor(gm) {
        this.gm = gm;
        this.level = 1;
        this.maxLevel = 5;
        this.round = 0;
        this.roundsPerLevel = 3;
        this.wrongCount = 0;
        this.start();
    }

    start() {
        this.round = 0;
        this.wrongCount = 0;
        this._nextRound();
    }

    _getPattern() {
        const allColors = [
            { name: 'Coral', hex: '#FF6B6B' },
            { name: 'Teal', hex: '#00C9A7' },
            { name: 'Yellow', hex: '#FFD166' },
            { name: 'Orange', hex: '#FF9F43' },
            { name: 'Pink', hex: '#FF6B9D' },
        ];

        // Difficulty progression
        let type, seqLen;
        if (this.level <= 1) { type = 'AB'; seqLen = 4; }
        else if (this.level === 2) { type = 'AB'; seqLen = 5; }
        else if (this.level === 3) { type = 'ABB'; seqLen = 5; }
        else if (this.level === 4) { type = 'ABC'; seqLen = 6; }
        else { type = 'ABC'; seqLen = 7; }

        // Pick unique colors for the pattern
        const shuffled = [...allColors].sort(() => Math.random() - 0.5);
        const patColors = type === 'AB' ? shuffled.slice(0, 2) : shuffled.slice(0, 3);

        // Build pattern sequence
        let seq = [];
        if (type === 'AB') {
            const base = [patColors[0], patColors[1]];
            for (let i = 0; i < seqLen; i++) seq.push(base[i % 2]);
        } else if (type === 'ABB') {
            const base = [patColors[0], patColors[1], patColors[1]];
            for (let i = 0; i < seqLen; i++) seq.push(base[i % 3]);
        } else {
            const base = [patColors[0], patColors[1], patColors[2]];
            for (let i = 0; i < seqLen; i++) seq.push(base[i % 3]);
        }

        // Answer is the last element
        const answer = seq.pop();
        return { sequence: seq, answer, allColors: patColors };
    }

    _nextRound() {
        if (this.round >= this.roundsPerLevel) {
            this._completeLevel();
            return;
        }
        this.round++;
        const pattern = this._getPattern();
        this.answer = pattern.answer;

        // Generate wrong options (different from answer)
        const wrongs = pattern.allColors.filter(c => c.hex !== pattern.answer.hex);
        this._shuffle(wrongs);
        const options = [pattern.answer, wrongs[0], wrongs[1] || pattern.allColors[0]];
        this._shuffle(options);

        this._render(pattern.sequence, options);
    }

    _render(sequence, options) {
        const area = this.gm.gameArea;

        let carsHTML = sequence.map(c =>
            `<div class="train-car" style="background:${c.hex};"></div><div class="train-link"></div>`
        ).join('');
        carsHTML += `<div class="train-car train-car-mystery">?</div>`;

        let optionsHTML = options.map((o, i) =>
            `<div class="pattern-option" data-hex="${o.hex}" style="background:${o.hex};" tabindex="0" role="button" aria-label="${o.name}"></div>`
        ).join('');

        area.innerHTML = `
            <div class="level-banner">Level ${this.level} — Round ${this.round} of ${this.roundsPerLevel}</div>
            <div class="train-container">
                <div class="train-track">
                    <div class="train-engine">🚂</div>
                    ${carsHTML}
                </div>
            </div>
            <p class="star-question" style="margin-top:8px;">What comes next?</p>
            <div class="pattern-options">${optionsHTML}</div>`;

        area.querySelectorAll('.pattern-option').forEach(el => {
            el.addEventListener('click', () => this._pickOption(el));
            el.addEventListener('keydown', e => {
                if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); el.click(); }
            });
        });
    }

    _pickOption(el) {
        const hex = el.dataset.hex;
        // Prevent double-click
        if (el.classList.contains('correct') || el.classList.contains('wrong')) return;

        if (hex === this.answer.hex) {
            // Correct — replace mystery car
            this.gm.audio.ding();
            el.classList.add('correct');
            this.gm.addScore(15);

            const mysteryCar = document.querySelector('.train-car-mystery');
            if (mysteryCar) {
                mysteryCar.style.background = this.answer.hex;
                mysteryCar.textContent = '';
                mysteryCar.classList.remove('train-car-mystery');
                mysteryCar.style.animation = 'matchBounce 0.5s ease';
            }

            setTimeout(() => this._nextRound(), 900);
        } else {
            // Wrong
            this.gm.audio.wrong();
            this.wrongCount++;
            el.classList.add('wrong');
            setTimeout(() => el.classList.remove('wrong'), 500);
        }
    }

    _completeLevel() {
        const stars = this.wrongCount === 0 ? 3 : this.wrongCount <= 1 ? 2 : 1;
        const hasNext = this.level < this.maxLevel;
        this.gm.showCelebration(stars, `Level ${this.level} complete!`, hasNext);
    }

    nextLevel() {
        this.level++;
        this.start();
    }

    destroy() {}

    _shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
    }
}

/* ══════════════════════════════════════════
   Star Count — Counting Game
   ══════════════════════════════════════════ */
class StarCount {
    constructor(gm) {
        this.gm = gm;
        this.level = 1;
        this.maxLevel = 5;
        this.round = 0;
        this.roundsPerLevel = 3;
        this.wrongCount = 0;
        this.start();
    }

    start() {
        this.round = 0;
        this.wrongCount = 0;
        this._nextRound();
    }

    _getCount() {
        // Difficulty: number of stars increases
        const ranges = [
            [1, 3], [2, 4], [3, 6], [5, 8], [6, 10]
        ];
        const [min, max] = ranges[Math.min(this.level - 1, ranges.length - 1)];
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    _generatePositions(count) {
        const positions = [];
        const fieldW = 340;
        const fieldH = 220;
        const starSize = 42;
        const margin = 15;

        for (let i = 0; i < count; i++) {
            let tries = 0;
            let x, y;
            do {
                x = margin + Math.random() * (fieldW - starSize - margin * 2);
                y = margin + Math.random() * (fieldH - starSize - margin * 2);
                tries++;
            } while (tries < 50 && positions.some(p =>
                Math.abs(p.x - x) < starSize && Math.abs(p.y - y) < starSize
            ));
            positions.push({ x, y });
        }
        return positions;
    }

    _nextRound() {
        if (this.round >= this.roundsPerLevel) {
            this._completeLevel();
            return;
        }
        this.round++;
        const count = this._getCount();
        const positions = this._generatePositions(count);

        // Generate 3 options: correct + 2 wrong
        let options = new Set([count]);
        while (options.size < 3) {
            let n = count + (Math.random() < 0.5 ? 1 : -1) * (Math.floor(Math.random() * 3) + 1);
            if (n >= 1 && n <= 12) options.add(n);
        }
        const optArr = [...options];
        this._shuffle(optArr);

        this._render(count, positions, optArr);
    }

    _render(count, positions, options) {
        const area = this.gm.gameArea;

        let starsHTML = positions.map((p, i) =>
            `<span class="count-star" style="left:${p.x}px;top:${p.y}px;animation-delay:${i * 0.1}s;" data-idx="${i}">⭐</span>`
        ).join('');

        let optionsHTML = options.map(n =>
            `<div class="count-option" data-num="${n}" tabindex="0" role="button" aria-label="${n}">${n}</div>`
        ).join('');

        area.innerHTML = `
            <div class="level-banner">Level ${this.level} — Round ${this.round} of ${this.roundsPerLevel}</div>
            <p class="star-question">How many stars do you see?</p>
            <div class="star-field" id="star-field">${starsHTML}</div>
            <div class="count-options">${optionsHTML}</div>`;

        // Tap stars for visual feedback
        area.querySelectorAll('.count-star').forEach(el => {
            el.addEventListener('click', () => {
                this.gm.audio.tap();
                el.classList.remove('tapped');
                void el.offsetWidth;
                el.classList.add('tapped');
            });
        });

        // Pick answer
        area.querySelectorAll('.count-option').forEach(el => {
            el.addEventListener('click', () => this._pickAnswer(el, count));
            el.addEventListener('keydown', e => {
                if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); el.click(); }
            });
        });
    }

    _pickAnswer(el, correctCount) {
        const num = parseInt(el.dataset.num);
        if (el.classList.contains('correct') || el.classList.contains('wrong')) return;

        if (num === correctCount) {
            this.gm.audio.ding();
            el.classList.add('correct');
            this.gm.addScore(15);

            // All stars celebrate
            document.querySelectorAll('.count-star').forEach((s, i) => {
                setTimeout(() => {
                    s.style.animation = 'starTap 0.4s ease';
                }, i * 60);
            });

            setTimeout(() => this._nextRound(), 1000);
        } else {
            this.gm.audio.wrong();
            this.wrongCount++;
            el.classList.add('wrong');
            setTimeout(() => el.classList.remove('wrong'), 500);
        }
    }

    _completeLevel() {
        const stars = this.wrongCount === 0 ? 3 : this.wrongCount <= 1 ? 2 : 1;
        const hasNext = this.level < this.maxLevel;
        this.gm.showCelebration(stars, `Level ${this.level} complete!`, hasNext);
    }

    nextLevel() {
        this.level++;
        this.start();
    }

    destroy() {}

    _shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
    }
}
